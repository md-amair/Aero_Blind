<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERO BLIND</title>
    <style>
        /* ── Reset & Base ──────────────────────────────────────────────────── */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background:linear-gradient(
                to bottom,
                #0094FF 0%,
                #bcbec3 65% 
                );
            font-family: 'Segoe UI', sans-serif;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: rgb(255, 255, 255);
            font-size: 24px;             
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #overlayBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            background: rgb(40, 88, 55);
            border: 2px solid rgba(255,255,255,0.18);
            border-radius: 18px;
            padding: 40px 52px;
            text-align: center;
            color: white;
            min-width: 340px;
            box-shadow: 0 8px 48px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        #overlayTitle {
            font-size: 40px;            
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            text-shadow: 0 0 24px rgba(255, 255, 255, 0.4);
        }

        #overlaySubtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            margin-bottom: 28px;
            min-height: 22px;
        }

        .overlay-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 17px;
            letter-spacing: 1px;
        }
        .overlay-stat:last-of-type { border-bottom: none; }
        .stat-label { color: rgb(255, 255, 255); text-transform: uppercase; font-size: 13px; }
        .stat-value { font-weight: 700; font-size: 22px; color: rgb(255, 255, 255); }

        #overlayBtn {
            margin-top: 30px;
            padding: 14px 48px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: #ffffffed;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #overlayInstructions {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        #snowCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <div id="overlayBox">
        <div id="overlayTitle">AERO BLIND</div>
        <div id="overlaySubtitle"></div>

        <div class="overlay-stat">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="overlayScore">0</span>
        </div>
        <div class="overlay-stat">
            <span class="stat-label">High Score</span>
            <span class="stat-value" id="overlayHighScore">0</span>
        </div>

        <button id="overlayBtn">Start</button>
        <div id="overlayInstructions">SPACE or CLICK to Ascend</div>
    </div>

    <canvas id="snowCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    // ════════════════════════════════════════════════════════════════════
    //  SECTION 1 — SNOW PARTICLE SYSTEM
    // ════════════════════════════════════════════════════════════════════
     (function () {
            const canvas = document.getElementById('snowCanvas');
            const ctx = canvas.getContext('2d');
            const FLAKE_COUNT = 38;
            const flakes = [];

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            function randomFlake(fromTop) {
                return {
                    x: Math.random() * canvas.width,
                    y: fromTop ? -Math.random() * canvas.height : Math.random() * canvas.height,
                    r: 0.8 + Math.random() * 2.2,
                    speed: 0.8 + Math.random() * 1.0,
                    drift: (Math.random() - 0.5) * 0.7,
                    alpha: 0.4 + Math.random() * 0.55,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.008 + Math.random() * 0.012
                };
            }

            for (let i = 0; i < FLAKE_COUNT; i++) flakes.push(randomFlake(false));

            function animateSnow() {
                if (window.gameInstance && window.gameInstance.gameRunning) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (const f of flakes) {
                        f.wobble += f.wobbleSpeed;
                        f.x += f.drift + Math.sin(f.wobble) * 0.4;
                        f.y += f.speed;
                        if (f.y > canvas.height + 4) { Object.assign(f, randomFlake(true)); f.y = -4; }
                        if (f.x < -4) f.x = canvas.width + 4;
                        if (f.x > canvas.width + 4) f.x = -4;
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${f.alpha})`;
                        ctx.fill();
                    }
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(animateSnow);
            }
            animateSnow();
        })();
       
    // ════════════════════════════════════════════════════════════════════
    //  SECTION 2 — MAIN GAME CLASS: AeroBlind3D
    // ════════════════════════════════════════════════════════════════════

    class AeroBlind3D {

        constructor() {
            this.scene    = new THREE.Scene();
            this.camera   = new THREE.PerspectiveCamera(
                70,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

            try {
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: window.devicePixelRatio < 2, 
                    alpha: true,
                    powerPreference: "high-performance"
                });
            } catch (e) {
                // Absolute fallback for very old drivers
                this.renderer = new THREE.WebGLRenderer({ alpha: true });
            }

            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setClearColor(0x000000, 0);
            document.body.appendChild(this.renderer.domElement);

            //High Refresh Rates: Initialize a clock to track delta time
            this.clock = new THREE.Clock();

            this.sharedGeometries = {
                pipeBody: new THREE.CylinderGeometry(5.2, 5.2, 1, 24),
                pipeCap:  new THREE.CylinderGeometry(6.4, 6.4, 2.5, 24),
                pipeRing: new THREE.CylinderGeometry(5.6, 5.6, 0.8, 24)
            };

            this.sharedMaterials = {
                pipe:     new THREE.MeshPhongMaterial({ color: 0x1a5d1a, shininess: 30 }),
                pipeCap:  new THREE.MeshPhongMaterial({ color: 0x0d2d0d, shininess: 20 }),
                pipeRing: new THREE.MeshPhongMaterial({ color: 0x0f3f0f, shininess: 25 })
            };

            const savedHighScore = localStorage.getItem('aeroBlindHighScore');
            this.highScore = savedHighScore ? parseInt(savedHighScore) : 0;

            this.initSceneFresh();
            this.setupControls();
            this.showStartOverlay();
            this.gameLoop();

            window.addEventListener('resize', () => this.onWindowResize());
        }

        showStartOverlay() {
            document.getElementById('overlayTitle').textContent     = 'AERO BLIND';
            document.getElementById('overlaySubtitle').textContent  = '';
            document.getElementById('overlayScore').textContent     = '0';
            document.getElementById('overlayHighScore').textContent = this.highScore;
            document.getElementById('overlayBtn').textContent       = 'Start';
            document.getElementById('overlayBox').style.display     = 'block';
        }

        showCrashOverlay() {
            document.getElementById('overlayTitle').textContent     = 'CRASHED';
            document.getElementById('overlaySubtitle').textContent  = 'Better luck next time!';
            document.getElementById('overlayScore').textContent     = this.score;
            document.getElementById('overlayHighScore').textContent = this.highScore;
            document.getElementById('overlayBtn').textContent       = 'Restart';
            document.getElementById('overlayBox').style.display     = 'block';
        }

        hideOverlay() { document.getElementById('overlayBox').style.display = 'none'; }

        isOverlayVisible() { return document.getElementById('overlayBox').style.display !== 'none'; }

        resetState() {
            this.playerPos = new THREE.Vector3(0, 0, 0);
            this.velocity  = 0;
            this.forwardSpeed = 0.8;
            this.gravity      = -0.020;
            this.jumpForce    = 0.43;
            this.score = 0;
            this.pipes = [];
            this.pipeDistance = 80;
            this.pipeGap      = 14;
            this.gameRunning    = false;
            this.waitingToStart = false;
            this.clock.getDelta(); 
        }

        initSceneFresh() {
            const toRemove = this.scene.children.filter(c => c !== this.ambientLight && c !== this.sun);
            toRemove.forEach(c => this.scene.remove(c));

            if (!this.ambientLight) {
                this.ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(this.ambientLight);
            }
            if (!this.sun) {
                this.sun = new THREE.DirectionalLight(0xffffff, 0.7);
                this.sun.position.set(10, 50, 10);
                this.scene.add(this.sun);
            }

            this.resetState();

            for (let i = 1; i <= 5; i++) this.createPipe(i * this.pipeDistance);

            document.getElementById('score').textContent     = 0;
            document.getElementById('highScore').textContent = this.highScore;

            this.camera.position.set(0, 0, 0);
            this.camera.lookAt(0, 0, 0);
        }

        createPipe(z) {
            const pipeGroup = new THREE.Group();
            const gapCenter = (Math.random() - 0.5) * 22;
            const halfGap   = this.pipeGap / 2;
            const pipeHeight = 26;

            this.createPipeSection(pipeGroup, pipeHeight, gapCenter + halfGap, true);
            this.createPipeSection(pipeGroup, pipeHeight, gapCenter - halfGap, false);

            pipeGroup.position.z = z;
            pipeGroup.userData   = { scored: false, gapCenter, halfGap };
            this.pipes.push(pipeGroup);
            this.scene.add(pipeGroup);
        }

        createPipeSection(group, height, gapEdge, isUpper) {
            const dir   = isUpper ? 1 : -1;
            const pipeY = gapEdge + (dir * height / 2);

            const body = new THREE.Mesh(this.sharedGeometries.pipeBody, this.sharedMaterials.pipe);
            body.position.y = pipeY;
            body.scale.y    = height;
            group.add(body);

            const cap = new THREE.Mesh(this.sharedGeometries.pipeCap, this.sharedMaterials.pipeCap);
            cap.position.y = gapEdge;
            group.add(cap);

            const ring1 = new THREE.Mesh(this.sharedGeometries.pipeRing, this.sharedMaterials.pipeRing);
            ring1.position.y = pipeY + (dir * height * 0.25);
            group.add(ring1);

            const ring2 = new THREE.Mesh(this.sharedGeometries.pipeRing, this.sharedMaterials.pipeRing);
            ring2.position.y = pipeY - (dir * height * 0.25);
            group.add(ring2);
        }

        setupControls() {
            document.getElementById('overlayBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                this.beginPlay();
            });

            document.addEventListener('mousedown', (e) => {
                if (document.getElementById('overlayBox').contains(e.target)) return;
                if (this.gameRunning) this.velocity = this.jumpForce;
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (this.isOverlayVisible()) {
                        this.beginPlay();
                    } else if (this.gameRunning) {
                        this.velocity = this.jumpForce;
                    }
                }
            });
        }

        beginPlay() {
            this.initSceneFresh();
            this.hideOverlay();
            this.gameRunning = true;
        }

        update() {
            if (!this.gameRunning) return;

            //Normalize speed across refresh rates
            const delta = this.clock.getDelta();
            const timeScale = Math.min(delta, 0.1) * 60; 

            this.velocity    += this.gravity * timeScale;
            this.playerPos.y += this.velocity * timeScale;
            this.playerPos.z += this.forwardSpeed * timeScale;

            this.camera.position.copy(this.playerPos);
            this.camera.lookAt(0, this.playerPos.y * 0.9, this.playerPos.z + 20);

            for (let i = this.pipes.length - 1; i >= 0; i--) {
                const pipe = this.pipes[i];
                if (!pipe.userData.scored && pipe.position.z < this.playerPos.z) {
                    pipe.userData.scored = true;
                    this.score++;
                    document.getElementById('score').textContent = this.score;
                }
                if (pipe.position.z < this.playerPos.z - 50) {
                    this.scene.remove(pipe);
                    this.pipes.splice(i, 1);
                }
            }

            if (this.pipes.length < 5) {
                const lastPipeZ = this.pipes[this.pipes.length - 1].position.z;
                this.createPipe(lastPipeZ + this.pipeDistance);
            }
            this.checkCollisions();
        }

        checkCollisions() {
            if (Math.abs(this.playerPos.y) > 29) { this.gameOver(); return; }
            for (const pipe of this.pipes) {
                const dZ = Math.abs(pipe.position.z - this.playerPos.z);
                if (dZ < 5.5) {
                    const { gapCenter, halfGap } = pipe.userData;
                    if (this.playerPos.y > gapCenter + halfGap - 1 ||
                        this.playerPos.y < gapCenter - halfGap + 1) {
                        this.gameOver();
                        return;
                    }
                }
            }
        }

        gameOver() {
            this.gameRunning = false;

            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('aeroBlindHighScore', this.highScore.toString());
            }

            document.getElementById('highScore').textContent = this.highScore;
            this.showCrashOverlay();
        }

        onWindowResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        gameLoop() {
            this.update();
            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame(() => this.gameLoop());
        }
    }

    window.gameInstance = new AeroBlind3D();
    </script>
</body>
</html>
